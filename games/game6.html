<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>반응속도 테스트 — 나케이드</title>
  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="../assets/css/game-base.css?v=4">
  <link rel="stylesheet" href="../assets/css/game6.css?v=4">
</head>
<body>
  <div class="game-container rt-container">
    <div class="rt-hud">
      <div class="rt-counter"><span id="trialNum">1</span>/5</div>
      <div class="rt-chips" id="trialChips"></div>
    </div>
    <div class="rt-arena" id="arena">
      <div class="rt-arena-emoji" id="arenaEmoji">👆</div>
      <div class="rt-arena-text" id="arenaText">준비되면 시작!</div>
      <div class="rt-arena-sub" id="arenaSub">초록색이 되는 순간 터치하세요</div>
    </div>
  </div>

  <div class="overlay" id="overlay"></div>
  <script src="../assets/js/arcade.js?v=4"></script>
  <script src="../assets/js/game6.js?v=4"></script>

</html>
