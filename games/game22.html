<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>슬라이딩 퍼즐 — 나케이드</title>
  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="../assets/css/game-base.css?v=4">
  <link rel="stylesheet" href="../assets/css/game22.css?v=4">
</head>
<body>
  <main class="slide-wrap">
    <div class="stat-row hud">
      <div class="stat-item">
        <span class="stat-val" id="timeEl">0.0초</span>
        <span class="stat-lbl">시간</span>
      </div>
      <div class="stat-item">
        <span class="stat-val" id="movesEl">0</span>
        <span class="stat-lbl">이동</span>
      </div>
      <div class="stat-item">
        <span class="stat-val" id="bestEl">—</span>
        <span class="stat-lbl">최고 기록</span>
      </div>
    </div>

    <div class="size-row" id="sizePills"></div>

    <div class="puzzle-board" id="board">
      <div class="board-inner" id="boardInner"></div>
    </div>

    <div class="slide-controls">
      <button type="button" id="shuffleBtn" class="btn-secondary">🔀 섞기</button>
      <button type="button" id="hintBtn" class="btn-secondary">💡 힌트</button>
    </div>
  </main>

  <div class="overlay" id="overlay"></div>

  <script src="../assets/js/arcade.js?v=4"></script>
  <script src="../assets/js/game22.js?v=4"></script>
</body>
</html>
