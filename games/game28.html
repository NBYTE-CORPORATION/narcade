<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>과일 박스 — 나케이드</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="../assets/css/game-base.css?v=4">
  <link rel="stylesheet" href="../assets/css/game28.css?v=4">
</head>
<body>
  <div class="fruit-wrapper">
    <div class="hud">
      <div class="hud-item">
        <span class="hud-lbl">점수</span>
        <span class="hud-val" id="score">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-lbl">콤보</span>
        <span class="hud-val combo-val" id="combo">-</span>
      </div>
      <div class="hud-item">
        <span class="hud-lbl">남은 시간</span>
        <span class="hud-val timer-val" id="timer">2:00</span>
      </div>
      <div class="hud-item">
        <span class="hud-lbl">최고</span>
        <span class="hud-val best-val" id="best">0</span>
      </div>
    </div>

    <div class="time-bar"><div class="time-fill" id="timeFill"></div></div>

    <div class="board-container" id="boardContainer">
      <div class="board" id="board"></div>
      <div class="selection-box" id="selBox"><span class="sel-sum" id="selSum">0</span></div>
    </div>

    <div class="sum-indicator" id="sumIndicator">합: 0</div>
  </div>

  <div class="overlay" id="overlay"></div>

  <script src="../assets/js/arcade.js?v=4"></script>
  <script src="../assets/js/game28.js?v=4"></script>
</body>
</html>
