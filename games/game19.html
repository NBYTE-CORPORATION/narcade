<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>카드 짝 맞추기 — 나케이드</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="../assets/css/game-base.css?v=4">
  <link rel="stylesheet" href="../assets/css/game19.css?v=4">
</head>
<body>
  <div class="mem-container">
    <div class="mem-header">
      <h1>🃏 카드 짝 맞추기</h1>

      <div class="mem-stats">
        <div class="stat-item">
          <span class="stat-val" id="timeEl">0:00</span>
          <span class="stat-lbl">TIME</span>
        </div>
        <div class="stat-item">
          <span class="stat-val" id="movesEl">0</span>
          <span class="stat-lbl">MOVES</span>
        </div>
        <div class="stat-item">
          <span class="stat-val combo-val" id="comboEl">0</span>
          <span class="stat-lbl">COMBO</span>
        </div>
      </div>

      <div id="diffBtns"></div>
    </div>

    <div class="mem-grid" id="cardGrid"></div>

    <div class="mem-start" id="startScreen">
      <button id="startBtn">게임 시작</button>
      <div class="best-row" id="bestRow"></div>
    </div>
  </div>

  <div class="overlay" id="overlay"></div>

  <script src="../assets/js/arcade.js?v=4"></script>
  <script src="../assets/js/game19.js?v=4"></script>
</body>
</html>
