<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>두더지 잡기 — 나케이드</title>
  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="../assets/css/game-base.css?v=4">
  <link rel="stylesheet" href="../assets/css/game13.css?v=4">
</head>
<body>
  <div class="mole-wrap">
    <div class="mole-header">
      <h1>🔨 두더지 잡기</h1>
      <div class="hud-boxes">
        <div class="score-box">
          <span class="score-val" id="score">0</span>
          <span class="score-lbl">점수</span>
        </div>
        <div class="score-box timer-box">
          <span class="score-val" id="timer">30</span>
          <span class="score-lbl">시간</span>
        </div>
        <div class="score-box">
          <span class="score-val" id="best">0</span>
          <span class="score-lbl">최고</span>
        </div>
      </div>
    </div>

    <div class="mole-grid" id="moleGrid">
      <!-- 9 holes generated by JS -->
    </div>
  </div>

  <div class="overlay" id="overlay"></div>
  <script src="../assets/js/arcade.js?v=4"></script>
  <script src="../assets/js/game13.js?v=4"></script>
</body>
</html>
