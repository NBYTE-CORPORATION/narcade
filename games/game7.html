<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>퀵 타이핑 — 나케이드</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../assets/css/game-base.css">
  <link rel="stylesheet" href="../assets/css/game7.css">
</head>
<body>
  <a href="../index.html" class="back-btn">← 목록</a>
  <div class="game-container">
    <h1>⌨️ 퀵 타이핑</h1>
    <p>아래 문장을 최대한 빠르게 입력하세요!</p>
    <p id="targetText"></p>
    <input type="text" id="userInput" placeholder="여기에 입력" />
    <div class="button-group">
      <button onclick="checkTyping()">확인</button>
      <button class="btn-secondary" onclick="startGame()">다시 시작</button>
    </div>
    <p id="result"></p>
  </div>
  <script src="../assets/js/game7.js"></script>
</body>
</html>
