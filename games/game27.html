<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>메탈 슬러그 — 나케이드</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="../assets/css/game-base.css">
  <link rel="stylesheet" href="../assets/css/game27.css">
</head>
<body>
  <a href="../index.html" class="back-btn">← 목록</a>

  <div class="ms-wrap">
    <div class="ms-hud">
      <div class="hud-item">
        <span class="hud-val" id="scoreEl">0</span>
        <span class="hud-lbl">SCORE</span>
      </div>
      <div class="hud-item">
        <span class="ms-lives" id="livesEl">❤️❤️❤️</span>
        <span class="hud-lbl">LIVES</span>
      </div>
      <div class="hud-item">
        <span class="hud-val" id="ammoEl">∞</span>
        <span class="hud-lbl">AMMO</span>
      </div>
      <div class="hud-item">
        <span class="hud-val" id="waveEl">1</span>
        <span class="hud-lbl">WAVE</span>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="c"></canvas>
      <div class="overlay" id="overlay">
        <div class="ov-inner">
          <div class="ov-emoji">🪖</div>
          <h2 id="ovTitle">메탈 슬러그</h2>
          <p id="ovMsg">← → 이동 &nbsp;|&nbsp; Z·Space 점프<br>X·↑ 사격 &nbsp;|&nbsp; C 수류탄<br>적을 처치하고 살아남아라!</p>
          <button id="startBtn">게임 시작</button>
        </div>
      </div>
    </div>

    <div class="ms-controls">
      <kbd>← →</kbd> 이동 &nbsp; <kbd>Z</kbd> 점프 &nbsp; <kbd>X</kbd> 사격 &nbsp; <kbd>C</kbd> 수류탄
    </div>
  </div>

  <script src="../assets/js/game27.js"></script>
</body>
</html>
