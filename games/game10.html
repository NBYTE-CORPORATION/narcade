<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>숫자 순서 클릭 — 나케이드</title>
  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="../assets/css/game-base.css?v=4">
  <link rel="stylesheet" href="../assets/css/game10.css?v=4">
</head>
<body>
  <div class="game-container">
    <div class="stat-row hud">
      <div class="stat-item">
        <span class="stat-val" id="nextNum">1</span>
        <span class="stat-lbl">다음 숫자</span>
      </div>
      <div class="stat-item">
        <span class="stat-val" id="time">0.0초</span>
        <span class="stat-lbl">시간</span>
      </div>
      <div class="stat-item">
        <span class="stat-val" id="best">—</span>
        <span class="stat-lbl">최고 기록</span>
      </div>
    </div>

    <div id="grid" class="num-grid" aria-label="숫자 그리드"></div>

    <p class="hint">1을 누르는 순간부터 시간이 측정돼요</p>
  </div>

  <div class="overlay" id="overlay"></div>
  <script src="../assets/js/arcade.js?v=4"></script>
  <script src="../assets/js/game10.js?v=4"></script>
</body>
</html>
