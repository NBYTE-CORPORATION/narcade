<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>2048 — 나케이드</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="../assets/css/game-base.css?v=4">
  <link rel="stylesheet" href="../assets/css/game12.css?v=4">
</head>
<body>
  <div class="game2048-wrap">
    <div class="game2048-header">
      <h1>🧩 2048</h1>
      <div class="score-panel">
        <div class="score-box">
          <span class="score-val" id="score">0</span>
          <span class="score-lbl">점수</span>
        </div>
        <div class="score-box">
          <span class="score-val" id="best">0</span>
          <span class="score-lbl">최고</span>
        </div>
      </div>
    </div>

    <div class="board-wrap" id="boardWrap">
      <div class="board-bg">
        <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
        <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
        <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
        <div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div><div class="cell-bg"></div>
      </div>
      <div class="board" id="board"></div>
    </div>

    <p class="hint-text">방향키 또는 스와이프로 조작하세요</p>
    <button type="button" id="newGameBtn" class="btn-secondary new-game-btn">새 게임</button>
  </div>

  <div class="overlay" id="overlay"></div>

  <script src="../assets/js/arcade.js?v=4"></script>
  <script src="../assets/js/game12.js?v=4"></script>
</body>
</html>
