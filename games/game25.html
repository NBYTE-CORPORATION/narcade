<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>체스 — 나케이드</title>
  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="../assets/css/game-base.css?v=4">
  <link rel="stylesheet" href="../assets/css/game25.css?v=4">
</head>
<body>
  <div class="chess-wrap">
    <!-- 왼쪽 패널 -->
    <aside class="chess-side">
      <div class="cs-panel">
        <div class="cs-player" id="blackPanel">
          <div class="cs-avatar black-avatar">♚</div>
          <div class="cs-info">
            <span class="cs-name">컴퓨터</span>
            <span class="cs-label">BLACK</span>
          </div>
        </div>
        <div class="cs-captured" id="blackCaptured"></div>
      </div>

      <div class="cs-status" id="statusBox">
        <span id="statusText">게임 시작을 눌러주세요</span>
      </div>

      <div class="cs-panel">
        <div class="cs-player" id="whitePanel">
          <div class="cs-avatar white-avatar">♔</div>
          <div class="cs-info">
            <span class="cs-name">플레이어</span>
            <span class="cs-label">WHITE</span>
          </div>
        </div>
        <div class="cs-captured" id="whiteCaptured"></div>
      </div>

      <div class="cs-controls">
        <button type="button" id="startBtn">게임 시작</button>
        <button type="button" id="undoBtn" class="btn-secondary" disabled>↩ 무르기</button>
        <div class="cs-difficulty">
          <span>난이도</span>
          <div id="diffPills"></div>
        </div>
        <div class="cs-wins">누적 승리 <span id="winsEl">0</span></div>
      </div>
    </aside>

    <!-- 체스판 -->
    <div class="chess-board-wrap">
      <div class="board-ranks" id="boardRanks"></div>
      <canvas id="chessCanvas" width="480" height="480"></canvas>
      <div class="board-files" id="boardFiles"></div>

      <!-- 프로모션 팝업 -->
      <div class="promotion-popup hidden" id="promotionPopup">
        <div class="promo-title">프로모션 선택</div>
        <div class="promo-choices">
          <button type="button" class="promo-btn" data-piece="5">♕</button>
          <button type="button" class="promo-btn" data-piece="4">♖</button>
          <button type="button" class="promo-btn" data-piece="3">♗</button>
          <button type="button" class="promo-btn" data-piece="2">♘</button>
        </div>
      </div>
    </div>

    <!-- 오른쪽: 기보 -->
    <aside class="chess-history">
      <div class="history-header">기보</div>
      <div class="history-list" id="historyList"></div>
    </aside>
  </div>

  <div class="overlay" id="overlay"></div>

  <script src="../assets/js/arcade.js?v=4"></script>
  <script src="../assets/js/game25.js?v=4"></script>
</body>
</html>
