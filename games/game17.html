<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>지뢰 찾기 — 나케이드</title>
  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="../assets/css/game-base.css?v=4">
  <link rel="stylesheet" href="../assets/css/game17.css?v=4">
</head>
<body>
  <main class="ms-container">
    <div class="ms-stats">
      <div class="stat-item">
        <span class="stat-val" id="mineCount">10</span>
        <span class="stat-lbl">💣 남은 지뢰</span>
      </div>
      <button type="button" class="ms-face" id="faceBtn" aria-label="다시 시작">🙂</button>
      <div class="stat-item">
        <span class="stat-val" id="timerEl">000</span>
        <span class="stat-lbl">⏱ 시간</span>
      </div>
      <div class="stat-item">
        <span class="stat-val" id="bestEl">—</span>
        <span class="stat-lbl">🏆 최고</span>
      </div>
    </div>

    <div class="ms-controls">
      <div id="diffPills"></div>
      <button type="button" class="flag-mode-btn" id="flagModeBtn" aria-pressed="false">🚩 깃발 모드</button>
    </div>

    <div class="ms-board" id="board">
      <div class="ms-grid" id="grid"></div>
    </div>

    <p class="ms-hint">모바일: 길게 눌러 깃발 꽂기 · PC: 우클릭 깃발</p>
  </main>

  <div class="overlay" id="overlay"></div>

  <script src="../assets/js/arcade.js?v=4"></script>
  <script src="../assets/js/game17.js?v=4"></script>
</body>
</html>
