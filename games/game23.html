<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>오목 — 나케이드</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="../assets/css/game-base.css?v=4">
  <link rel="stylesheet" href="../assets/css/game23.css?v=4">
</head>
<body>
  <div class="gomoku-wrap">
    <div class="gomoku-hud">
      <div class="hud-item">
        <span class="turn-dot" id="playerDot"></span>
        <span class="hud-val" id="turnEl">내 차례</span>
      </div>
      <div class="hud-item hud-center">
        <span class="score-me" id="scoreMe">0</span>
        <span class="score-sep">:</span>
        <span class="score-ai" id="scoreAi">0</span>
        <span class="hud-lbl">나 : AI</span>
      </div>
      <div class="hud-item">
        <span class="hud-val" id="moveEl">0</span>
        <span class="hud-lbl">수</span>
      </div>
      <div class="hud-item">
        <span class="hud-val hud-wins" id="winsEl">0</span>
        <span class="hud-lbl">전적(승)</span>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="c"></canvas>
    </div>

    <div class="gomoku-controls">
      <button type="button" id="undoBtn" class="btn-secondary" disabled>↩ 무르기</button>
      <button type="button" id="newBtn" class="btn-secondary">새 대국</button>
    </div>
    <p class="touch-hint" id="touchHint">첫 탭으로 자리 확인, 같은 자리를 한 번 더 탭하면 착수!</p>
  </div>

  <div class="overlay" id="overlay"></div>

  <script src="../assets/js/arcade.js?v=4"></script>
  <script src="../assets/js/game23.js?v=4"></script>
</body>
</html>
