<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>리듬 탭 — 나케이드</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="../assets/css/game-base.css?v=4">
  <link rel="stylesheet" href="../assets/css/game18.css?v=4">
</head>
<body>
  <div class="rhythm-wrap">
    <div class="rhythm-hud">
      <div class="hud-item">
        <span class="hud-val" id="scoreEl">0</span>
        <span class="hud-lbl">SCORE</span>
      </div>
      <div class="hud-item hud-center">
        <span class="hud-val hud-timer" id="timerEl">60</span>
        <span class="hud-lbl">TIME</span>
      </div>
      <div class="hud-item">
        <span class="hud-val hud-combo" id="comboEl">0</span>
        <span class="hud-lbl">COMBO</span>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="c" width="400" height="540"></canvas>
    </div>
  </div>

  <div class="touch-zones" id="touchZones" aria-hidden="true">
    <button type="button" class="touch-zone" data-lane="0">D</button>
    <button type="button" class="touch-zone" data-lane="1">F</button>
    <button type="button" class="touch-zone" data-lane="2">J</button>
    <button type="button" class="touch-zone" data-lane="3">K</button>
  </div>

  <div class="overlay" id="overlay"></div>

  <script src="../assets/js/arcade.js?v=4"></script>
  <script src="../assets/js/game18.js?v=4"></script>
</body>
</html>
