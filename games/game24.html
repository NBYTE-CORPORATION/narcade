<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>핀볼 — 나케이드</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="../assets/css/game-base.css?v=4">
  <link rel="stylesheet" href="../assets/css/game24.css?v=4">
</head>
<body>
  <div class="pb-wrap">

    <!-- 사이드 HUD -->
    <div class="pb-sidebar">
      <div class="pb-score-box">
        <span class="pb-score-lbl">SCORE</span>
        <span class="pb-score-val" id="scoreEl">0</span>
      </div>
      <div class="pb-score-box pb-best-box">
        <span class="pb-score-lbl">BEST</span>
        <span class="pb-score-val pb-best-val" id="bestEl">0</span>
      </div>
      <div class="pb-mini-box">
        <span class="pb-score-lbl">BALL</span>
        <div class="pb-balls" id="ballsEl">
          <span class="pb-ball-dot"></span>
          <span class="pb-ball-dot"></span>
          <span class="pb-ball-dot"></span>
        </div>
      </div>
      <div class="pb-mini-box">
        <span class="pb-score-lbl">MULTI</span>
        <span class="pb-multi-val" id="multEl">×1</span>
      </div>
      <div class="pb-controls">
        <div class="pb-key-row"><kbd>Z</kbd><kbd>←</kbd> 왼쪽</div>
        <div class="pb-key-row"><kbd>X</kbd><kbd>→</kbd> 오른쪽</div>
        <div class="pb-key-row"><kbd>Space</kbd> 발사</div>
      </div>
    </div>

    <!-- 캔버스 -->
    <div class="canvas-wrap">
      <canvas id="c"></canvas>
    </div>

  </div>

  <div class="overlay" id="overlay"></div>

  <script src="../assets/js/arcade.js?v=4"></script>
  <script src="../assets/js/game24.js?v=4"></script>
</body>
</html>
