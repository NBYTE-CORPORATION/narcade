<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>기억력 게임 — 나케이드</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../assets/css/game-base.css">
  <link rel="stylesheet" href="../assets/css/game3.css">
</head>
<body>
  <a href="../index.html" class="back-btn">← 목록</a>
  <div class="game-container">
    <h1>🧠 기억력 테스트</h1>
    <p id="display">잠시 후 숫자가 나옵니다...</p>
    <input type="text" id="userInput" placeholder="숫자를 입력하세요" disabled>
    <div class="button-group">
      <button onclick="checkAnswer()">확인</button>
      <button class="btn-secondary" onclick="startGame()">다시 시작</button>
    </div>
    <p id="result"></p>
  </div>
  <script src="../assets/js/game3.js"></script>
</body>
</html>
