<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>스네이크 — 나케이드</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="../assets/css/game-base.css?v=4">
  <link rel="stylesheet" href="../assets/css/game11.css?v=4">
</head>
<body>
  <div class="snake-wrapper">
    <div class="snake-header">
      <h1>🐍 스네이크</h1>
      <div class="score-panel">
        <div class="score-box">
          <span class="score-val" id="score">0</span>
          <span class="score-lbl">점수</span>
        </div>
        <div class="score-box">
          <span class="score-val" id="bestScore">0</span>
          <span class="score-lbl">최고</span>
        </div>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="snakeCanvas" width="400" height="400"></canvas>
    </div>
    <p class="snake-hint">방향키/WASD 또는 스와이프로 조작</p>
  </div>

  <div class="overlay" id="overlay"></div>

  <script src="../assets/js/arcade.js?v=4"></script>
  <script src="../assets/js/game11.js?v=4"></script>
</body>
</html>
